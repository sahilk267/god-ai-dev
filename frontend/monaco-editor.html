<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Editor - Monaco</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0b0f19;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .toolbar button {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }

        .toolbar button:hover {
            background: rgba(99, 102, 241, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        #status {
            font-family: 'JetBrains Mono', monospace;
            color: #34d399;
            font-size: 13px;
        }

        .file-explorer {
            background: rgba(0,0,0,0.3);
            width: 260px;
            border-right: 1px solid rgba(255,255,255,0.08);
            overflow-y: auto;
            padding: 15px;
        }

        .file-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            margin: 4px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #cbd5e1;
            transition: background 0.2s;
        }

        .file-item:hover { background: rgba(255,255,255,0.05); }
        .file-item.active {
            background: rgba(99, 102, 241, 0.2);
            color: #fff;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .editor-container { flex: 1; display: flex; flex-direction: column; }
        #editor { flex: 1; }

        .logs-panel {
            height: 250px;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.08);
            overflow-y: auto;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .log-entry {
            color: #cbd5e1;
            margin: 4px 0;
            border-left: 2px solid #6366f1;
            padding-left: 8px;
        }

        .log-entry:nth-child(even) { background: rgba(255,255,255,0.02); }

        .status-bar {
            background: rgba(17, 24, 39, 0.9);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 25px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="toolbar">
        <button onclick="saveFile()">💾 Save</button>
        <button onclick="runCode()">▶️ Run</button>
        <button onclick="deploy()">🚀 Deploy</button>
        <button onclick="formatCode()">✨ Format</button>
        <span style="flex:1"></span>
        <span id="status">Ready</span>
    </div>

    <div class="main-container">
        <div class="file-explorer" id="fileExplorer"></div>
        <div class="editor-container">
            <div id="editor"></div>
            <div class="logs-panel" id="logsPanel"></div>
        </div>
    </div>

    <div class="status-bar">
        <span>AI Developer System</span>
        <span id="cursorPos">Ln 1, Col 1</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.js"></script>
    <script>
        let editor = null;
        let currentFile = null;
        let files = {};

        // Initialize Monaco Editor
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: '// Welcome to AI Developer System\n// Start coding or let AI generate code for you\n\nconsole.log("Hello World!");',
                language: 'javascript',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: true }
            });

            // Cursor position tracking
            editor.onDidChangeCursorPosition((e) => {
                document.getElementById('cursorPos').innerText = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
            });
        });

        async function saveFile() {
            if (!currentFile) return;
            const content = editor.getValue();
            files[currentFile] = content;
            addLog(`Saved ${currentFile}`);
            document.getElementById('status').innerText = 'Saved';
            setTimeout(() => document.getElementById('status').innerText = 'Ready', 2000);
        }

        async function runCode() {
            addLog('▶️ Validating syntax...');
            const code = editor.getValue();

            try {
                // Syntax check only without executing arbitrary code
                new Function(code);
                addLog(`✅ Syntax is valid`);
            } catch (error) {
                addLog(`❌ Syntax Error: ${error.message}`);
            }
        }

        async function deploy() {
            addLog('🚀 Deploying to production...');
            document.getElementById('status').innerText = 'Deploying...';

            // Call backend API
            const response = await fetch('/api/deploy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': 'god_mode_secret_key' },
                body: JSON.stringify({ files: files, main_file: currentFile })
            });

            const result = await response.json();
            if (result.success) {
                addLog(`✅ Deployed successfully! URL: ${result.url}`);
            } else {
                addLog(`❌ Deployment failed: ${result.error}`);
            }

            document.getElementById('status').innerText = 'Ready';
        }

        function formatCode() {
            addLog('✨ Formatting code...');
            editor.getAction('editor.action.formatDocument').run().then(() => {
                addLog('✅ Code formatted');
            });
        }

        function addLog(message) {
            const logsPanel = document.getElementById('logsPanel');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsPanel.appendChild(logEntry);
            logEntry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Load initial file explorer
        async function loadFiles() {
            const response = await fetch('/api/files');
            const data = await response.json();
            files = data.files;

            const explorer = document.getElementById('fileExplorer');
            explorer.innerHTML = '';

            for (const [filename, content] of Object.entries(files)) {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'file-item';
                fileDiv.textContent = `📄 ${filename}`;
                fileDiv.onclick = (e) => openFile(filename, e);
                explorer.appendChild(fileDiv);
            }
        }

        function openFile(filename, event) {
            currentFile = filename;
            editor.setValue(files[filename] || '');

            // Update active state
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            if (event && event.target) {
                event.target.classList.add('active');
            }
        }

        // Load files on startup
        loadFiles();
    </script>
</body>

</html>
