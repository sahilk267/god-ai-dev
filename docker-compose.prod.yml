version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ai_network
  
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: always
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.production
    depends_on:
      - redis
    volumes:
      - workspace_data:/app/workspace
      - logs_data:/app/logs
    networks:
      - ai_network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
  
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ai_network
  
  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ai_network

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - ai_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      # - ./ssl:/etc/nginx/ssl  # Uncomment when SSL certs are ready
    depends_on:
      - backend
      - frontend
    networks:
      - ai_network

volumes:
  redis_data:
  workspace_data:
  logs_data:

networks:
  ai_network:
    driver: bridge