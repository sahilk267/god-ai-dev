# Production Configuration

server:
  host: 0.0.0.0
  port: 8000
  workers: 4
  
database:
  type: redis
  url: redis://redis:6379
  
agents:
  max_retries: 5
  timeout: 120
  temperature: 0.2
  
queue:
  max_concurrent: 5
  max_queue_size: 100
  
deployment:
  docker_registry: ghcr.io
  auto_deploy: true
  
monitoring:
  enable_metrics: true
  log_level: INFO