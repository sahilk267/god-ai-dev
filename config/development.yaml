# Development Configuration

server:
  host: 127.0.0.1
  port: 8000
  workers: 1
  reload: true
  
database:
  type: redis
  url: redis://localhost:6379
  
agents:
  max_retries: 3
  timeout: 60
  temperature: 0.3
  
queue:
  max_concurrent: 2
  max_queue_size: 50
  
deployment:
  docker_registry: local
  auto_deploy: false
  
monitoring:
  enable_metrics: false
  log_level: DEBUG