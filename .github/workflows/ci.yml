name: Final Validation Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Pytest Core Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install PyAudio dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc portaudio19-dev python3-pyaudio
        
    - name: Install pip dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Execution Test Matrix
      env:
        QWEN_API_KEY: "ci_integration_dummy"
        DEEPSEEK_API_KEY: "ci_integration_dummy"
        GITHUB_TOKEN: "ci_integration_dummy"
        WORKSPACE_DIR: "./workspace"
      run: |
        pytest test/ -v --tb=short
